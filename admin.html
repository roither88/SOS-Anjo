<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="scr/css/main.css">
    <title>Painel Administrativo - SOS-Anjo</title>
</head>

<body>

    <header class="topo">
        <div class="logo">SOS ANJO</div>
        <div class="navbar-esquerda">
            <strong>SOS-Anjo</strong>
            <span id="statusLogin" class="status-login">Não logado</span>
        </div>

        <div class="login-area">
            <button id="btnIrInicio" class="btn neutro">VOLTAR INÍCIO</button>
        </div>
    </header>

    <main class="container">
        <section class="painel-card painel-admin">
            <h1 class="painel-titulo">Painel de Administracao</h1>
            <p id="adminAviso" class="admin-aviso"></p>

            <section id="adminBlocoCriacao" class="oculto admin-bloco">
                <h2 class="bloco-titulo">Criar primeiro administrador</h2>

                <div class="login-area linha-formulario">
                    <input type="text" id="adminCriarNome" placeholder="Nome do administrador">
                    <input type="text" id="adminCriarLocal" placeholder="Local (ex.: Sala de controle)">
                    <input type="password" id="adminCriarSenha" placeholder="Defina a senha admin">
                    <button id="btnCriarAdmin" class="btn primario">Criar Administrador</button>
                </div>
            </section>

            <section id="adminBlocoLogin" class="oculto admin-bloco">
                <h2 class="bloco-titulo">Login de administrador</h2>
                <div class="login-area linha-formulario">
                    <input type="text" id="adminLoginNome" placeholder="Nome de login admin">
                    <input type="password" id="adminLoginSenha" placeholder="Senha de administrador">
                    <button id="btnAdminLogin" class="btn primario">Entrar no Painel</button>
                </div>
            </section>

            <section id="adminPainel" class="oculto admin-bloco">
                <div class="admin-toolbar">
                    <p id="adminUsuarioLogado" class="admin-usuario-logado"></p>
                    <button id="btnIrCadastroPainel" class="btn neutro">Cadastro Usuario</button>
                    <button id="btnAdminAtualizar" class="btn primario">Atualizar</button>
                    <button id="btnAdminLogout" class="btn neutro">Sair do Painel</button>
                </div>

                <div class="tabela-wrap">
                    <table class="admin-tabela">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th>Local</th>
                                <th>Perfil</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="adminTabelaCorpo"></tbody>
                    </table>
                </div>

                <h2 class="bloco-titulo">Ultimos logs do botao de emergencia</h2>
                <div class="tabela-wrap">
                    <table class="admin-tabela">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Usuario</th>
                                <th>Local</th>
                                <th>Data/Hora</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="adminLogsCorpo"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="scr/js/main.js"></script>
</body>

</html>
