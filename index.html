<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema SOS-Anjo para alertas e emergências">
    <meta property="og:image" content="scr/imagens/anjos_logo.png">
    <meta property="og:title" content="SOS ANJOS">
    <title>SOS ANJOS</title>

    <link rel="stylesheet" href="scr/css/main.css">
    <link rel="icon" type="image/png" sizes="32x32" href="scr/imagens/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="scr/imagens/favicons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="scr/imagens/favicons/apple-touch-icon-180x180.png">
    <link rel="android-chrome-icon" sizes="192x192" href="scr/imagens/favicons/android-icon-192x192.png">
   
</head>

<body>

    <!-- HEADER -->
    <header class="topo">
        <div class="logo">
            <img src="scr/imagens/anjos_logo.png" alt="SOS ANJO Logo" style="height: 45px; margin-right: 10px;">
        </div>
         <div class="navbar-esquerda">
            <span id="statusLogin" class="status-login">Não logado</span>
        </div>

        <div class="login-area">
            <input type="text" id="loginNome" placeholder="Nome">
            <input type="password" id="loginSenha" placeholder="Senha">

            <button class="btn primario" id="btnLogin">Entrar</button>
            <button class="btn neutro" id="btnLogout">Sair</button>
            <button class="btn neutro" id="btnIrAdmin">Painel ADM</button>
            <button class="btn neutro" id="btnIrAlertas">Ver Alertas</button>
        </div>
    </header>

    <!-- CONTEÚDO -->
    <main class="container">

        <button id="btnEmergencia">
            SOS <br> EMERGÊNCIA
        </button>
    <button class="btn neutro oculto" id="btnDesativarAlerta" type="button">
            Desativar alerta sonoro
        </button>

        <audio id="audioAlerta" preload="auto" loop>
            <source src="scr/audios/alerta2.mp3" type="audio/mpeg">
        </audio>

        <button class="btn neutro oculto" id="btnDesativarAlerta" type="button">
            Desativar alerta sonoro
        </button>

        <audio id="audioAlerta" preload="auto" loop>
            <source src="scr/audios/alerta2.mp3" type="audio/mpeg">
        </audio>

    </main>

    <script src="scr/js/main.js"></script>

</body>
</html>
