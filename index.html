<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="scr/css/main.css">
    <title>SOS-Anjo</title>
</head>

<body>

    <!-- Faixa de perigo no topo -->
    <div class="faixa-alerta"></div>

    <nav class="navbar-topo">
        <div class="navbar-esquerda">
            <strong>SOS-Anjo</strong>
            <span id="statusLogin" class="status-login">Não logado</span>
        </div>
        <div class="navbar-direita">
            <input type="text" id="loginNome" placeholder="Nome de login">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button id="btnLogin" class="botao-navbar">LOGIN</button>
            <button id="btnLogout" class="botao-navbar secundario">SAIR</button>
            <button id="btnIrAdmin" class="botao-navbar secundario">PAINEL ADMIN</button>
            <button id="btnIrCadastro" class="botao-navbar secundario">IR PARA CADASTRO</button>
        </div>
    </nav>

    <!-- Luzes LED nos cantos -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container container-principal">

        <!-- ESQUERDA -->
        <div class="painel-esquerdo">

            <button id="btnEmergencia" class="botao-emergencia">
                <span class="push-text">PUSH</span>
                <span class="for-text">— FOR —</span>
                <span class="survive-text">SURVIVE</span>
            </button>

            <button id="btnDesativar" class="botao-desativar">
                DESATIVAR ALERTA
            </button>

        </div>

    </div>

    <script src="scr/js/main.js"></script>

</body>
</html>
