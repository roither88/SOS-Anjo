<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="scr/css/main.css">
    <title>Cadastro de Usuário - SOS-Anjo</title>
</head>

<body>

    <!-- Faixa de perigo no topo -->
    <div class="faixa-alerta"></div>

    <nav class="navbar-topo">
        <div class="navbar-esquerda">
            <strong>SOS-Anjo</strong>
            <span id="statusLogin" class="status-login">Não logado</span>
        </div>
        <div class="navbar-direita">
            <input type="text" id="loginNome" placeholder="Nome de login">
            <input type="password" id="loginSenha" placeholder="Senha">
            <button id="btnLogin" class="botao-navbar">LOGIN</button>
            <button id="btnLogout" class="botao-navbar secundario">SAIR</button>
            <button id="btnIrAdmin" class="botao-navbar secundario">PAINEL ADMIN</button>
            <button id="btnIrInicio" class="botao-navbar secundario">VOLTAR INÍCIO</button>
        </div>
    </nav>

    <div class="container container-cadastro">
        <div class="painel-direito painel-direito-cadastro">
            <div class="login-box" id="cadastroUsuario">
                <span class="campo-titulo">Cadastro do usuário</span>

                <div class="campo">
                    <div class="input-wrapper">
                        <span class="icone">&#128100;</span>
                        <span class="campo-label">Nome:</span>
                        <input type="text" id="nome" placeholder="Digite o nome">
                    </div>
                </div>

                <div class="campo">
                    <div class="input-wrapper">
                        <span class="icone">&#128205;</span>
                        <span class="campo-label">Local:</span>
                        <input type="text" id="local" placeholder="Ex.: Sala 3">
                    </div>
                </div>

                <div class="campo">
                    <div class="input-wrapper">
                        <span class="icone">&#128274;</span>
                        <span class="campo-label">Senha:</span>
                        <input type="password" id="senha" placeholder="Crie uma senha">
                    </div>
                </div>

                <button id="btnEntrar" class="botao-entrar">SALVAR USUÁRIO</button>
            </div>
        </div>
    </div>

    <script src="scr/js/main.js"></script>

</body>
</html>
